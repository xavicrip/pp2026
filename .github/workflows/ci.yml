name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # El job espera a que PostgreSQL esté listo antes de empezar
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, xml, curl, zip
          coverage: none

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar la aplicación
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verificar estilo de código (Pint)
        run: ./vendor/bin/pint --test

      - name: Compilar assets
        run: |
          npm ci
          npm run build

      - name: Ejecutar pruebas
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ecommerce_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres