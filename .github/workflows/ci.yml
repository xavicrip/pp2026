name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, mbstring, xml, curl, zip
          coverage: none

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar la aplicación
        run: |
          cp .env.example .env
          php artisan key:generate
          chmod -R 777 storage bootstrap/cache
          mkdir -p database
          touch database/database.sqlite

      - name: Verificar estilo de código (Pint)
        run: ./vendor/bin/pint --test

      - name: Compilar assets
        run: |
          npm ci
          npm run build

      - name: Preparar base de datos
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Ejecutar pruebas
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
