name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ecommerce_test
      DB_USERNAME: root
      DB_PASSWORD: password

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ecommerce_test
        ports:
          - 3306:3306
        # El job espera a que MySQL esté listo antes de empezar
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, curl, zip
          coverage: none

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar la aplicación
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verificar estilo de código (Pint)
        run: ./vendor/bin/pint --test

      - name: Compilar assets
        run: |
          npm ci
          npm run build

      - name: Preparar base de datos
        run: php artisan migrate --force

      - name: Ejecutar pruebas
        run: php artisan test